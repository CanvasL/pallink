services:
  gateway-api:
    build:
      context: .
      dockerfile: ./deploy/docker/gateway-api.Dockerfile
    depends_on:
      - user-rpc
      - activity-rpc
      - notification-rpc
      - im-rpc
      - etcd
      - redis
    expose:
      - "8080"
      - "9101"

  user-rpc:
    build:
      context: .
      dockerfile: ./deploy/docker/user-rpc.Dockerfile
    depends_on:
      - postgres
      - etcd
    ports:
      - "8002:8002"
    expose:
      - "9102"

  activity-rpc:
    build:
      context: .
      dockerfile: ./deploy/docker/activity-rpc.Dockerfile
    depends_on:
      - postgres
      - etcd
      - rabbitmq
    restart: unless-stopped
    ports:
      - "8004:8004"
    expose:
      - "9103"

  notification-rpc:
    build:
      context: .
      dockerfile: ./deploy/docker/notification-rpc.Dockerfile
    depends_on:
      - postgres
      - rabbitmq
      - etcd
    restart: unless-stopped
    ports:
      - "8006:8006"
    expose:
      - "9105"

  im-rpc:
    build:
      context: .
      dockerfile: ./deploy/docker/im-rpc.Dockerfile
    depends_on:
      - postgres
      - rabbitmq
      - etcd
      - user-rpc
    restart: unless-stopped
    ports:
      - "8005:8005"
    expose:
      - "9104"

  audit-worker:
    build:
      context: .
      dockerfile: ./deploy/docker/audit-worker.Dockerfile
    depends_on:
      - rabbitmq
      - etcd
      - activity-rpc
    restart: unless-stopped

  postgres:
    image: postgres:15
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    environment:
      POSTGRES_USER: pallink
      POSTGRES_PASSWORD: pallink
      POSTGRES_DB: pallink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  etcd:
    image: registry.k8s.io/etcd:v3.5.21
    environment:
      ETCDCTL_API: "3"
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=default=http://etcd:2380
      - --initial-cluster-token=etcd-cluster-1
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
      - "2380:2380"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: pallink
      RABBITMQ_DEFAULT_PASS: pallink
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  caddy:
    image: caddy:2-alpine
    depends_on:
      - gateway-api
      - swagger-ui
      - pghero
      - prometheus
      - grafana
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.32.0
    environment:
      BASE_URL: /docs
      SWAGGER_JSON: /swagger/swagger.json
    volumes:
      - ./gateway/swagger.json:/swagger/swagger.json:ro
    expose:
      - "8080"

  pghero:
    image: ankane/pghero:v3.7.0
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://pallink:pallink@postgres:5432/pallink
      PGHERO_USERNAME: admin
      PGHERO_PASSWORD: pallink
    restart: unless-stopped
    expose:
      - "8080"

  prometheus:
    image: prom/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: pallink
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - prometheus
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
