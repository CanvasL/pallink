version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pallink
      POSTGRES_PASSWORD: pallink
      POSTGRES_DB: pallink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  etcd:
    image: registry.k8s.io/etcd:v3.5.21
    environment:
      ETCDCTL_API: "3"
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=default=http://etcd:2380
      - --initial-cluster-token=etcd-cluster-1
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
      - "2380:2380"
  
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: pallink
      RABBITMQ_DEFAULT_PASS: pallink
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.32.0
    environment:
      SWAGGER_JSON: /swagger/swagger.json
    volumes:
      - ./gateway/swagger.json:/swagger/swagger.json:ro
    ports:
      - "8090:8080"

  user-rpc:
    build:
      context: .
      dockerfile: ./deploy/docker/user-rpc.Dockerfile
    depends_on:
      - postgres
      - etcd
    ports:
      - "8002:8002"

  activity-rpc:
    build:
      context: .
      dockerfile: ./deploy/docker/activity-rpc.Dockerfile
    depends_on:
      - postgres
      - etcd
      - rabbitmq
    restart: unless-stopped
    ports:
      - "8004:8004"

  audit-worker:
    build:
      context: .
      dockerfile: ./deploy/docker/audit-worker.Dockerfile
    depends_on:
      - rabbitmq
      - etcd
      - activity-rpc
    restart: unless-stopped

  gateway-api:
    build:
      context: .
      dockerfile: ./deploy/docker/gateway-api.Dockerfile
    depends_on:
      - user-rpc
      - activity-rpc
      - etcd
    ports:
      - "8080:8080"

volumes:
  postgres_data:
