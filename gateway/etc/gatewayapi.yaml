Name: gatewayApi
Host: 0.0.0.0
Port: 8080
Auth:
  AccessSecret: "pallink-mvp-secret"
  AccessExpire: 86400
UserRpc:
  Etcd:
    Hosts:
    - etcd:2379
    Key: user.rpc
ActivityRpc:
  Etcd:
    Hosts:
    - etcd:2379
    Key: activity.rpc
NotificationRpc:
  Etcd:
    Hosts:
    - etcd:2379
    Key: notification.rpc
ImRpc:
  Etcd:
    Hosts:
    - etcd:2379
    Key: im.rpc
RealtimeMQ:
  Url: "amqp://pallink:pallink@rabbitmq:5672/"
  Exchange: "im_realtime_events"
