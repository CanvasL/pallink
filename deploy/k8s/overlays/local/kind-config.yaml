kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
      - containerPort: 30379
        hostPort: 6379
        protocol: TCP
      - containerPort: 30672
        hostPort: 5672
        protocol: TCP
      - containerPort: 31672
        hostPort: 15672
        protocol: TCP
      - containerPort: 30801
        hostPort: 8081
        protocol: TCP
      - containerPort: 30090
        hostPort: 19090
        protocol: TCP
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
