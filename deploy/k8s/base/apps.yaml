apiVersion: v1
kind: Service
metadata:
  name: user-rpc
spec:
  selector:
    app: user-rpc
  ports:
    - name: rpc
      port: 8002
      targetPort: 8002
    - name: metrics
      port: 9102
      targetPort: 9102
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-rpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-rpc
  template:
    metadata:
      labels:
        app: user-rpc
    spec:
      volumes:
        - name: app-config
          configMap:
            name: pallink-runtime-config
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for target in postgres:5432 rabbitmq:5672; do
                host="${target%:*}"
                port="${target#*:}"
                until nc -z "${host}" "${port}"; do
                  echo "waiting for ${target}"
                  sleep 2
                done
              done
      containers:
        - name: user-rpc
          image: pallink/user-rpc:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: rpc
              containerPort: 8002
            - name: metrics
              containerPort: 9102
          volumeMounts:
            - name: app-config
              mountPath: /app/etc/user.yaml
              subPath: user.yaml
          readinessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
---
