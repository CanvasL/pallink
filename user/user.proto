syntax = "proto3";

package user;
option go_package = "./user";

// 用户服务
service User {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetUserInfo(GetUserInfoRequest) returns (UserInfo);
    rpc UpdateUserInfo(UpdateUserInfoRequest) returns (UserInfo);
    rpc UpdateUserAuditStatus(UpdateUserAuditStatusRequest) returns (UpdateUserAuditStatusResponse);
}

// 用户信息
message UserInfo {
    uint64 id = 1;
    string mobile = 2;
    string nickname = 3;
    string avatar = 4;
    int32 audit_status = 5;
}

// 注册
message RegisterRequest {
    string mobile = 1;
    string password = 2;
    string nickname = 3;
    string verify_code = 4;
}

message RegisterResponse {
    uint64 user_id = 1;
    string token = 2;
}

// 登录
message LoginRequest {
    string mobile = 1;
    string password = 2;
}

message LoginResponse {
    uint64 user_id = 1;
    string token = 2;
    UserInfo user_info = 3;
}

// 获取用户信息
message GetUserInfoRequest {
    uint64 user_id = 1;
}

// 更新用户信息
message UpdateUserInfoRequest {
    uint64 user_id = 1;
    string nickname = 2;
    string avatar = 3;
}

message UpdateUserAuditStatusRequest {
    uint64 user_id = 1;
    int32 audit_status = 2;
}

message UpdateUserAuditStatusResponse {
    bool success = 1;
    string message = 2;
}
