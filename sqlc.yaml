      go:
        package: "sqlc"
        out: "user/internal/dao/sqlc"
        sql_package: "pgx/v5"
        emit_empty_slices: true
  - schema: "deploy/docker/init.sql"
    queries: "activity/sqlc/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "activity/internal/dao/sqlc"
        sql_package: "pgx/v5"
        emit_empty_slices: true
  - schema: "deploy/docker/init.sql"
    queries: "notify/sqlc/queries.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "notify/internal/dao/sqlc"
        sql_package: "pgx/v5"
        emit_empty_slices: true
