syntax = "proto3";

package activity;
option go_package = "./activity";

import "google/protobuf/timestamp.proto";

service Activity {
    rpc CreateActivity(CreateActivityRequest) returns (ActivityInfo);
    rpc GetActivityList(GetActivityListRequest) returns (GetActivityListResponse);
    rpc GetActivityDetail(GetActivityDetailRequest) returns (ActivityInfo);
    rpc EnrollActivity(EnrollActivityRequest) returns (EnrollActivityResponse);
    rpc CancelEnroll(CancelEnrollRequest) returns (EnrollActivityResponse);
    rpc CheckIn(CheckInRequest) returns (EnrollActivityResponse);
    rpc UpdateActivity(UpdateActivityRequest) returns (ActivityInfo);
    rpc UpdateAuditStatus(UpdateAuditStatusRequest) returns (UpdateAuditStatusResponse);
    rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
    rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
    rpc UpdateCommentAuditStatus(UpdateCommentAuditStatusRequest) returns (UpdateCommentAuditStatusResponse);
    rpc GetMyActivities(GetMyActivitiesRequest) returns (GetActivityListResponse);
    rpc GetEnrolledActivities(GetEnrolledActivitiesRequest) returns (GetActivityListResponse);
    rpc GetParticipants(GetParticipantsRequest) returns (GetParticipantsResponse);
}

message ActivityInfo {
    uint64 id = 1;
    uint64 creator_id = 2;
    string title = 3;
    string description = 4;
    string location = 5;
    google.protobuf.Timestamp start_time = 6;
    google.protobuf.Timestamp end_time = 7;
    int32 max_people = 8;
    int32 current_people = 9;
    int32 status = 10;
    google.protobuf.Timestamp created_at = 11;
    string creator_name = 12;
    string creator_avatar = 13;
    bool is_enrolled = 14;
    int32 audit_status = 15;
}

message CreateActivityRequest {
    uint64 creator_id = 1;
    string title = 2;
    string description = 3;
    string location = 4;
    google.protobuf.Timestamp start_time = 5;
    google.protobuf.Timestamp end_time = 6;
    int32 max_people = 7;
}

message GetActivityListRequest {
    int32 page = 1;
    int32 page_size = 2;
    int32 status = 3;
    string keyword = 4;
    uint64 viewer_user_id = 5;
}

message GetActivityListResponse {
    repeated ActivityInfo activities = 1;
    int32 total = 2;
}

message GetActivityDetailRequest {
    uint64 id = 1;
    uint64 viewer_user_id = 2;
}

message EnrollActivityRequest {
    uint64 activity_id = 1;
    uint64 user_id = 2;
}

message EnrollActivityResponse {
    bool success = 1;
    string message = 2;
}

message CancelEnrollRequest {
    uint64 activity_id = 1;
    uint64 user_id = 2;
}

message CheckInRequest {
    uint64 activity_id = 1;
    uint64 user_id = 2;
    string code = 3;
}

message UpdateActivityRequest {
    uint64 id = 1;
    uint64 creator_id = 2;
    string title = 3;
    string description = 4;
    string location = 5;
    google.protobuf.Timestamp start_time = 6;
    google.protobuf.Timestamp end_time = 7;
    int32 max_people = 8;
    int32 status = 9;
}

message UpdateAuditStatusRequest {
    uint64 activity_id = 1;
    int32 audit_status = 2;
}

message UpdateAuditStatusResponse {
    bool success = 1;
    string message = 2;
}

message CommentInfo {
    uint64 id = 1;
    uint64 activity_id = 2;
    uint64 user_id = 3;
    uint64 parent_id = 4;
    string content = 5;
    google.protobuf.Timestamp created_at = 6;
    int32 audit_status = 7;
    string nickname = 8;
    string avatar = 9;
}

message CreateCommentRequest {
    uint64 activity_id = 1;
    uint64 user_id = 2;
    string content = 3;
    uint64 parent_id = 4;
}

message CreateCommentResponse {
    uint64 comment_id = 1;
}

message GetCommentsRequest {
    uint64 activity_id = 1;
    int32 page = 2;
    int32 page_size = 3;
    uint64 viewer_user_id = 4;
    uint64 parent_id = 5;
}

message GetCommentsResponse {
    repeated CommentInfo comments = 1;
    int32 total = 2;
}

message UpdateCommentAuditStatusRequest {
    uint64 comment_id = 1;
    int32 audit_status = 2;
}

message UpdateCommentAuditStatusResponse {
    bool success = 1;
    string message = 2;
}

message GetMyActivitiesRequest {
    uint64 user_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message GetEnrolledActivitiesRequest {
    uint64 user_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ParticipantInfo {
    uint64 user_id = 1;
    string nickname = 2;
    string avatar = 3;
    google.protobuf.Timestamp enroll_time = 4;
    google.protobuf.Timestamp checkin_time = 5;
    int32 status = 6;
}

message GetParticipantsRequest {
    uint64 activity_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message GetParticipantsResponse {
    repeated ParticipantInfo participants = 1;
    int32 total = 2;
}
